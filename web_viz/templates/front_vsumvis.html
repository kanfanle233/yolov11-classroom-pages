}

// ── TIMELINE VIEW ──
function renderTimelineView() {
  const svgContainer = document.querySelector("#seq-body");
  const emptyEl = document.getElementById("seq-empty");

  // Prefer API timeline data, fallback to segments + verified
  const td = ST.timelineData;
  const tracksData = td?.tracks || [];
  const alignments = td?.alignments || [];
  const transcripts = (td?.transcripts?.length > 0) ? td.transcripts : ST.transcript;
  const frameSeries = td?.frame_series || [];

  const segs = ST.timelineSegments;
  const vevents = ST.verifiedEvents;

  if (!tracksData.length && !alignments.length && !segs.length && !vevents.length) {
    svgContainer.style.display = "none";
    emptyEl && (emptyEl.style.display = "");
    return;
  }
  svgContainer.style.display = "";
  emptyEl && (emptyEl.style.display = "none");

  const container = document.getElementById("seq-svg").parentElement;
  const W = container.clientWidth || 1000;
  const H = container.clientHeight || 250;

  const svg = d3.select("#seq-svg");
  svg.selectAll("*").remove();
  svg.attr("viewBox", `0 0 ${W} ${H}`).attr("width", W).attr("height", H);

  const margin = {top: 8, right: 24, bottom: 28, left: 120};
  const iW = W - margin.left - margin.right;
  const iH = H - margin.top - margin.bottom;

  // Time extent from all sources
  const allStarts = [
    ...(tracksData.flatMap(t => t.segments||[]).map(s => s.start_time||0)),
    ...vevents.map(v => v.window_start||0),
    ...transcripts.map(t => t.start_time||0),
  ];
  const allEnds = [
    ...(tracksData.flatMap(t => t.segments||[]).map(s => s.end_time||0)),
    ...vevents.map(v => v.window_end||0),
    ...transcripts.map(t => t.end_time||0),
  ];
  const tMin = d3.min(allStarts) || 0;
  const tMax = d3.max(allEnds) || 100;
  const xScale = d3.scaleLinear().domain([tMin, tMax]).range([0, iW]);

  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  // ── Y tracks ──
  const trackDefs = [
    { key: "visual", label: "Visual Behavior" },
    { key: "text",   label: "Transcript" },
    { key: "align",  label: "Alignment" },
    { key: "verify", label: "Verification" },
  ];
  const trackH = 22;
  const trackGap = 3;
  const totalTH = trackDefs.length * trackH + (trackDefs.length - 1) * trackGap;
  const yScale = d3.scalePoint().domain(trackDefs.map(t => t.key)).range([0, totalTH]);

  const neededH = margin.top + totalTH + margin.bottom + 10;
  if (neededH > H) {
    svg.attr("height", neededH);
    svg.attr("viewBox", `0 0 ${W} ${neededH}`);
  }

  // Track labels
  for (const tr of trackDefs) {
    const y = yScale(tr.key);
    g.append("text").attr("x", -6).attr("y", y + trackH / 2 + 4)
      .attr("text-anchor", "end").attr("fill", "var(--text-mid)")
      .style("font-size", "9px").style("font-weight", "500").text(tr.label);
    g.append("line").attr("x1", 0).attr("x2", iW).attr("y1", y + trackH).attr("y2", y + trackH)
      .attr("stroke", "var(--border-light)").attr("stroke-width", 0.5);
  }

  // ── Helper to draw a timeline rectangle ──
  function drawTimelineRect(y, d, colorFn, extraClass) {
    const x0 = xScale(d.start_time || d.window_start || d.start || 0);
    const x1 = xScale(d.end_time || d.window_end || d.end || (d.start_time||0) + 0.2);
    const w = Math.max(2, x1 - x0);
    const sid = getStableId(d);
    const sel = isSelected(d);
    g.append("rect")
      .attr("x", x0).attr("y", y).attr("width", w).attr("height", trackH - 3)
      .attr("rx", 2).attr("class", extraClass || "")
      .attr("fill", typeof colorFn === "function" ? colorFn(d) : colorFn)
      .attr("fill-opacity", sel ? 1 : 0.6)
      .attr("stroke", sel ? "var(--text-strong)" : "none")
      .attr("stroke-width", sel ? 1.5 : 0)
      .style("cursor", "pointer")
      .on("mouseover", function(ev) {
        d3.select(this).attr("fill-opacity", 1).attr("stroke", "var(--text-strong)").attr("stroke-width", 1.5);
        showTimelineTooltip(ev, d);
      })
      .on("mouseout", function() {
        const s = isSelected(d);
        d3.select(this).attr("fill-opacity", s ? 1 : 0.6).attr("stroke", s ? "var(--text-strong)" : "none").attr("stroke-width", s ? 1.5 : 0);
        hideTooltip();
      })
      .on("click", function() {
        seekVideo(d.t_center || d.start_time || d.query_time || 0);
        updateSelection([d]);
        ST.selectedEventId = sid;
      });
  }

  // ── Track 0: Visual Behavior segments ──
  const visY = yScale("visual") + 2;
  if (tracksData.length) {
    for (const tr of tracksData.slice(0, 30)) {
      for (const s of (tr.segments || []).slice(0, 100)) {
        drawTimelineRect(visY, s, ST.behaviorColor(s.behavior || s.behavior_code || "unknown"));
      }
    }
  } else {
    for (const seg of segs.slice(0, 1500)) {
      drawTimelineRect(visY, seg, ST.behaviorColor(seg.semantic_label_en || seg.behavior_code || "unknown"));
    }
  }

  // ── Track 1: Transcript ──
  const txtY = yScale("text") + 2;
  for (const t of transcripts.slice(0, 500)) {
    g.append("rect")
      .attr("x", xScale(t.start_time || t.start || 0)).attr("y", txtY)
      .attr("width", Math.max(2, xScale(t.end_time || t.end || (t.start_time||0) + 0.5) - xScale(t.start_time || t.start || 0)))
      .attr("height", trackH - 3).attr("rx", 2)
      .attr("fill", "#7C83FF").attr("fill-opacity", 0.35).attr("stroke", "none")
      .on("mouseover", function(ev) { d3.select(this).attr("fill-opacity", 0.7); showTimelineTooltip(ev, { ...t, kind: "transcript" }); })
      .on("mouseout", function() { d3.select(this).attr("fill-opacity", 0.35); });
  }

  // ── Track 2: Alignments ──
  const alignY = yScale("align") + 2;
  for (const a of alignments.slice(0, 500)) {
    drawTimelineRect(alignY, a, d => ST.statusColor(d.match_status || "unverified"));
  }

  // ── Track 3: Verification events ──
  const vfyY = yScale("verify") + 2;
  for (const ve of vevents.slice(0, 500)) {
    drawTimelineRect(vfyY, ve, d => ST.statusColor(d.match_label || "unverified"));
  }

  // ── BrushX ──
  const brush = d3.brushX()
    .extent([[0, 0], [iW, totalTH]])
    .on("brush", function(ev) {
      if (!ev.selection) return;
      const [bx0, bx1] = ev.selection;
      ST.brushExtent = [xScale.invert(bx0), xScale.invert(bx1)];
      throttledTimelineBrush();
    })
    .on("end", function(ev) {
      if (!ev.selection) {
        ST.brushExtent = [0, Infinity];
        filterByBrushDebounced();
      }
    });
  g.append("g").attr("class", "brush").call(brush);

  // X axis
  g.append("g").attr("transform", `translate(0,${totalTH})`)
    .call(d3.axisBottom(xScale).ticks(8).tickFormat(d => `${d.toFixed(0)}s`))
    .selectAll("text").style("font-size", "9px").attr("fill", "var(--text-dim)");

  // Playhead
  const playhead = g.append("line")
    .attr("class", "playhead")
    .attr("y1", 0).attr("y2", totalTH)
    .attr("stroke", "#2563eb").attr("stroke-width", 2)
    .attr("visibility", "hidden")
    .attr("pointer-events", "none");

  // Click-to-seek on timeline background
  svg.on("click", function(ev) {
    if (ev.target && ev.target.closest && ev.target.closest(".brush,.playhead")) return;
    const [mx] = d3.pointer(ev, g.node());
    if (mx < 0 || mx > iW) return;
    seekVideo(xScale.invert(mx));
  });

  // Restore playhead position after view switch
  if (isFinite(ST.currentTime) && ST.currentTime > 0) {
    const px = xScale(ST.currentTime);
    playhead.attr("x1", px).attr("x2", px).attr("visibility", "visible");
  }

  ST._seqState = { xScale, playhead, iW, totalTH, g };
}

const throttledTimelineBrush = throttle(() => {
  const [lo, hi] = ST.brushExtent;
  const eids = new Set();
  for (const seg of ST.timelineSegments) {
    const t = seg.t_center || seg.start_time || 0;
    if (t >= lo && t <= hi) eids.add(getStableId(seg));
  }
  for (const ve of ST.verifiedEvents) {
    const t = ve.query_time || ve.window_start || 0;
    if (t >= lo && t <= hi) eids.add(getStableId(ve));
  }
  if (eids.size > 0) {
    ST.selectedIds = eids;
    refreshAllViews();
  }
}, 80);

function showTimelineTooltip(ev, d) {
  const tip = document.getElementById("tooltip");
  const st = d.match_status || d.match_label || "unverified";
  const cls = st === "match" ? "tt-match" : st === "uncertain" ? "tt-uncertain" : "tt-mismatch";
  if (d.kind === "transcript") {
    tip.innerHTML = `
      <div class="tt-row"><span class="tt-label">Transcript</span><span>${(d.start||0).toFixed(1)}–${(d.end||0).toFixed(1)}s</span></div>
      <div style="margin-top:3px;font-size:10px;line-height:1.4;max-width:280px;">${d.text || '–'}</div>`;
  } else {
    tip.innerHTML = `
      <div class="tt-row"><span class="tt-label">ID</span><span>${d.event_id || d.segment_id || d.query_id || '–'}</span></div>
      <div class="tt-row"><span class="tt-label">Time</span><span>${(d.start_time||d.window_start||0)?.toFixed?.(1)??0}–${(d.end_time||d.window_end||0)?.toFixed?.(1)??0}s</span></div>
      <div class="tt-row"><span class="tt-label">Status</span><span class="${cls}">${st}</span></div>
      <div class="tt-row"><span class="tt-label">Track</span><span>${d.track_id ?? '–'}</span></div>
      <div class="tt-row"><span class="tt-label">Behavior</span><span>${d.semantic_label_en || d.behavior_code || '–'}</span></div>
      <div class="tt-row"><span class="tt-label">Fusion</span><span>C_VIS ${(d.c_vis||d.c_visual||0)?.toFixed?.(3)??'–'}  C_TXT ${(d.c_txt||d.c_text||0)?.toFixed?.(3)??'–'}</span></div>`;
  }
  tip.style.left = (ev.clientX + 18) + "px";
  tip.style.top  = (ev.clientY - 8) + "px";
  tip.style.opacity = 1;
}

// ── MULTIMODAL VIEW ──
function renderMultimodalView() {
  const svgContainer = document.querySelector("#seq-body");
  const emptyEl = document.getElementById("seq-empty");
  svgContainer.style.display = "";
  emptyEl.style.display = "none";

  const container = document.getElementById("seq-svg").parentElement;
  const W = container.clientWidth || 1000;
  const H = container.clientHeight || 250;

  const svg = d3.select("#seq-svg");
  svg.selectAll("*").remove();
  svg.attr("viewBox", `0 0 ${W} ${H}`).attr("width", W).attr("height", H);

  // Use ST.timelineData.frame_series if available, else fallback
  const series = (ST.timelineData?.frame_series?.length > 0)
    ? ST.timelineData.frame_series.map((s, i) => ({
        t: s.time || i,
        score_model: s.score_model ?? 0.5,
        score_reference: s.score_ref ?? 0.5,
        c_visual: s.c_vis ?? 0,
        c_text: s.c_txt ?? 0,
        align_score: getAlignScore(s),
        uq_track: s.uq ?? 0,
      }))
    : ST.sequenceSeries;

  if (!series || series.length === 0) {
    svgContainer.style.display = "none";
    emptyEl && (emptyEl.style.display = "");
    return;
  }

  const margin = {top: 8, right: 32, bottom: 28, left: 48};
  const iW = W - margin.left - margin.right;
  const iH = H - margin.top - margin.bottom;

  const tMin = d3.min(series, d => d.t) || 0;
  const tMax = d3.max(series, d => d.t) || 100;
  const xScale = d3.scaleLinear().domain([tMin, tMax]).range([0, iW]);

  const yScale = d3.scaleLinear().domain([0, 1.05]).range([iH, 0]);

  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  const lines = [
    { key: "score_model", label: "Score Model", color: FEATURE_COLORS.score_model, dash: "" },
    { key: "score_reference", label: "Score Ref", color: "#9CA3AF", dash: "4,3" },
    { key: "c_visual", label: "C_VIS", color: FEATURE_COLORS.c_vis, dash: "" },
    { key: "c_text", label: "C_TXT", color: FEATURE_COLORS.c_txt, dash: "" },
    { key: "align_score", label: "ALIGN", color: FEATURE_COLORS.align_score, dash: "" },
    { key: "uq_track", label: "UQ", color: FEATURE_COLORS.uq, dash: "3,2" },
  ];

  for (const ln of lines) {
    const vals = series.map(s => ({t: s.t, v: s[ln.key] !== undefined ? s[ln.key] : 0}));
    const lineFn = d3.line().x(d => xScale(d.t)).y(d => yScale(d.v)).curve(d3.curveStepAfter);
    g.append("path").datum(vals)
      .attr("fill", "none").attr("stroke", ln.color)
      .attr("stroke-width", ln.key === "score_model" ? 1.8 : 1.1)
      .attr("stroke-dasharray", ln.dash)
      .attr("d", lineFn);

    // Legend
    g.append("text")
      .attr("x", iW + 4).attr("y", yScale(0.95))
      .attr("fill", ln.color).style("font-size", "8px").style("font-weight", "500")
      .text(ln.label);
  }

  // Playhead
  const playhead = g.append("line")
    .attr("class", "playhead")
    .attr("y1", 0).attr("y2", iH)
    .attr("stroke", "#2563eb").attr("stroke-width", 2)
    .attr("visibility", "hidden")
    .attr("pointer-events", "none");

  // Brush
  const brush = d3.brushX()
    .extent([[0, 0], [iW, iH]])
    .on("brush", function(ev) {
      if (!ev.selection) return;
      const [bx0, bx1] = ev.selection;
      ST.brushExtent = [xScale.invert(bx0), xScale.invert(bx1)];
      filterByBrushDebounced();
    })
    .on("end", function(ev) {
      if (!ev.selection) {
        ST.brushExtent = [0, Infinity];
        resetBrushFilterDebounced();
      }
    });
  g.append("g").attr("class", "brush").call(brush);

  // Click-to-seek
  svg.on("click", function(ev) {
    if (ev.target && ev.target.closest && ev.target.closest(".brush")) return;
    const [mx] = d3.pointer(ev, g.node());
    if (mx < 0 || mx > iW) return;
    seekVideo(xScale.invert(mx));
  });

  // X axis
  g.append("g").attr("transform", `translate(0,${iH})`)
    .call(d3.axisBottom(xScale).ticks(8).tickFormat(d => `${d.toFixed(0)}s`))
    .selectAll("text").style("font-size", "9px").attr("fill", "var(--text-dim)");

  g.append("text").attr("x", -38).attr("y", 6)
    .attr("fill", "var(--text-mid)").style("font-size", "8px")
    .text("Value");

  // Restore playhead position after view switch
  if (isFinite(ST.currentTime) && ST.currentTime > 0) {
    const px = xScale(ST.currentTime);
    playhead.attr("x1", px).attr("x2", px).attr("visibility", "visible");
  }

  ST._seqState = { xScale, playhead, iW, iH, g };
}

// ── UPDATE SUMMARY CHIPS WITH SELECTION STATS ──
function updateSummaryChipsWithSelection() {
  const selPts = getSelectedPoints();
  const info = ST.caseData?.case_info || {};
  const ms = info.match_summary || {};

  if (hasSelection() && selPts.length > 0) {
    document.getElementById("chip-contract").textContent = selPts.length;
    document.getElementById("chip-contract").parentElement.className = "summary-chip contract-OK";
    document.getElementById("chip-contract").parentElement.querySelector(".label").textContent = "SELECTED";

    const matchN = selPts.filter(p => p.verification_status === "match").length;
    const uncertainN = selPts.filter(p => p.verification_status === "uncertain").length;
    const mismatchN = selPts.filter(p => p.verification_status === "mismatch").length;
    const n = selPts.length;
    document.getElementById("chip-match").textContent = n ? (100*matchN/n).toFixed(0)+"%" : "–";
    document.getElementById("chip-uncertain").textContent =
      `${n ? (100*uncertainN/n).toFixed(0)+'%' : '–'} / ${n ? (100*mismatchN/n).toFixed(0)+'%' : '–'}`;
    document.getElementById("chip-verified").textContent = n;
    document.getElementById("chip-students").textContent = new Set(selPts.map(p => p.track_id)).size;
  } else {
    document.getElementById("chip-contract").textContent = info.contract_status || "–";
    document.getElementById("chip-contract").parentElement.className = `summary-chip contract-${info.contract_status || 'WARN'}`;
    document.getElementById("chip-contract").parentElement.querySelector(".label").textContent = "Contract";
    document.getElementById("chip-match").textContent = ms.match_rate != null ? ms.match_rate + "%" : "–";
    document.getElementById("chip-uncertain").textContent =
      `${ms.uncertain_rate != null ? ms.uncertain_rate + '%' : '–'} / ${ms.mismatch_rate != null ? ms.mismatch_rate + '%' : '–'}`;
    document.getElementById("chip-verified").textContent = info.verified_event_count ?? "–";
    document.getElementById("chip-students").textContent = info.student_count ?? "–";
  }
}
