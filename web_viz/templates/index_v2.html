<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom AV Dual-Verification Visual Analytics System</title>
    <script src="/docs/vendor/d3/d3.v7.min.js"></script>
    <script>
        if (!window.d3) {
            document.write('<script src="https://cdn.bootcdn.net/ajax/libs/d3/7.8.5/d3.min.js"><\\/script>');
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --bg-body: #f4f6f8;
        --bg-panel: #ffffff;
        --border: #e0e0e0;
        --text-main: #2c3e50;
        --text-dim: #7f8c8d;
        --accent: #0984e3;
        --highlight: #e17055;
        --danger: #e74c3c;
        --warning: #f39c12;
        --success: #27ae60;
    }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; padding: 0;
        background: var(--bg-body); color: var(--text-main);
        height: 100vh; display: grid;
        grid-template-columns: 220px 1fr 340px;
        grid-template-rows: 50px 1fr 200px;
        grid-template-areas: "header header header" "sidebar main stats" "bottom bottom bottom";
        overflow: hidden; gap: 1px;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    /* Header */
    .area-header { grid-area: header; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 10; }
    .brand { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .brand i { color: var(--accent); }
    #alert-banner { display: none; background: linear-gradient(90deg, var(--danger), #c0392b); color: #fff; padding: 4px 16px; border-radius: 6px; font-size: 12px; font-weight: 700; align-items: center; gap: 6px; }
    #alert-banner.visible { display: flex; animation: pulse-warning 1.5s ease-in-out infinite; }
    #case-selector { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: #fff; min-width: 200px; }

    /* Sidebar */
    .area-sidebar { grid-area: sidebar; background: #fff; border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
    .list-header { padding: 14px 16px; background: #fafafa; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; border-bottom: 1px solid var(--border); }
    .case-list-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-size: 12px; transition: all 0.15s; }
    .case-list-item:hover { background: #f8f9fa; }
    .case-list-item.active { background: #eaf4fc; color: var(--accent); border-right: 3px solid var(--accent); font-weight: 600; }
    .case-list-item .counts { font-size: 10px; color: #95a5a6; margin-top: 2px; }

    /* Main */
    .area-main { grid-area: main; background: #fff; display: flex; flex-direction: column; overflow: hidden; }
    .tab-bar { display: flex; height: 44px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab-btn { padding: 0 20px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-dim); display: flex; align-items: center; gap: 6px; background: transparent; border: none; transition: all 0.2s; }
    .tab-btn:hover { color: var(--accent); }
    .tab-btn.active { color: var(--accent); font-weight: 600; border-bottom: 3px solid var(--accent); }
    .view-panel { flex: 1; overflow: auto; display: none; flex-direction: column; }
    .view-panel.active { display: flex; }

    /* View A: Gantt Timeline */
    #gantt-legend { padding: 8px 16px; display: flex; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid #f0f0f0; font-size: 11px; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 3px; }
    #gantt-container { flex: 1; overflow: auto; position: relative; }
    .gantt-bar { cursor: pointer; transition: opacity 0.15s; }
    .gantt-bar:hover { opacity: 0.85; stroke: #2c3e50; stroke-width: 1.5; }
    .gantt-bar.dimmed { opacity: 0.2; }
    .gantt-bar.uncertain { fill: url(#diagonalHatch) !important; stroke: var(--warning); stroke-width: 1.5; }
    .gantt-bar.mismatch { animation: pulse-mismatch 0.8s ease-in-out infinite; stroke: var(--danger); stroke-width: 2; }

    /* View B: Weight Curve */
    #weight-chart { flex: 1; }
    .line-wv { fill: none; stroke: #0984e3; stroke-width: 2.5px; }
    .line-wa { fill: none; stroke: #e67e22; stroke-width: 2.5px; stroke-dasharray: 6,3; }

    /* View C: Evidence Panel */
    #evidence-panel { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .ev-card { background: #fafbfc; border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .ev-card h4 { margin: 0 0 12px; font-size: 13px; color: var(--accent); }
    .ev-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; border-bottom: 1px solid #f0f0f0; }
    .ev-row .ev-label { color: var(--text-dim); }
    .ev-row .ev-val { font-weight: 600; font-variant-numeric: tabular-nums; }
    #radar-svg { width: 100%; max-width: 280px; }
    .ev-asr { font-size: 13px; color: #555; padding: 10px; background: #fff; border-left: 3px solid var(--accent); border-radius: 4px; margin-top: 8px; }

    /* Right Stats */
    .area-stats { grid-area: stats; background: #fcfcfc; border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .stats-header { padding: 12px 16px; font-weight: 700; font-size: 12px; border-bottom: 1px solid var(--border); background: #fff; }
    .stats-body { flex: 1; overflow-y: auto; padding: 12px; }
    .metric-card { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; }
    .metric-card h5 { margin: 0 0 6px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
    .metric-val { font-size: 22px; font-weight: 700; color: var(--accent); }
    .metric-sub { font-size: 10px; color: var(--text-dim); }

    /* Bottom Video */
    .area-bottom { grid-area: bottom; display: flex; background: #fff; border-top: 1px solid var(--border); }
    .video-wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
    .video-controls { display: flex; align-items: center; gap: 8px; padding: 4px 12px; background: #fafafa; border-bottom: 1px solid var(--border); }
    .v-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; background: #fff; cursor: pointer; font-size: 11px; }
    .v-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .vid-container-inner { flex: 1; position: relative; overflow: hidden; }
    #myVideo { width: 100%; height: 100%; object-fit: contain; background: #000; }

    /* Animations */
    @keyframes pulse-mismatch {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(231,76,60,0.4)); }
        50%      { filter: drop-shadow(0 0 12px rgba(231,76,60,0.9)); }
    }
    @keyframes pulse-warning {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.7; }
    }
    .loading-mask { position: absolute; inset: 0; background: rgba(255,255,255,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
    .spinner { width: 32px; height: 32px; border: 3px solid #e0e0e0; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- HEADER -->
<header class="area-header">
    <div class="brand"><i class="fa-solid fa-graduation-cap"></i> Dual-Verification VAS</div>
    <select id="case-selector"><option value="">-- Select Case --</option></select>
    <div id="alert-banner"><i class="fa-solid fa-triangle-exclamation"></i> <span id="alert-text"></span></div>
</header>

<!-- SIDEBAR -->
<aside class="area-sidebar">
    <div class="list-header">Case Info</div>
    <div id="case-info-panel" style="padding:12px; font-size:12px; color:var(--text-dim);">
        Select a case to begin.
    </div>
    <div class="list-header" style="margin-top:auto;">Behavior Legend</div>
    <div id="legend-panel" style="padding:8px 12px; font-size:10px; display:flex; flex-wrap:wrap; gap:6px;"></div>
</aside>

<!-- MAIN -->
<main class="area-main">
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="gantt"><i class="fa-solid fa-bars-staggered"></i> Behavior Timeline</button>
        <button class="tab-btn" data-tab="weight"><i class="fa-solid fa-chart-line"></i> Weight Dynamics</button>
        <button class="tab-btn" data-tab="evidence"><i class="fa-solid fa-magnifying-glass-chart"></i> Evidence Detail</button>
    </div>

    <!-- View A: Gantt Timeline -->
    <div id="view-gantt" class="view-panel active">
        <div id="gantt-legend"></div>
        <div id="gantt-container"><div class="loading-mask"><div class="spinner"></div><div>Loading...</div></div></div>
    </div>

    <!-- View B: Weight Curves -->
    <div id="view-weight" class="view-panel">
        <div id="weight-chart"></div>
    </div>

    <!-- View C: Evidence Detail (per-event drill-down) -->
    <div id="view-evidence" class="view-panel">
        <div id="evidence-panel">
            <div style="grid-column:1/-1; color:var(--text-dim); text-align:center; padding:40px;">
                <i class="fa-solid fa-hand-pointer" style="font-size:24px; opacity:0.3; margin-bottom:8px;"></i><br>
                Click a behavior segment in the Timeline view to inspect evidence.
            </div>
        </div>
    </div>
</main>

<!-- STATS -->
<aside class="area-stats">
    <div class="stats-header">Case Metrics</div>
    <div class="stats-body" id="stats-body">
        <div class="metric-card"><h5>Students Tracked</h5><div class="metric-val" id="m-students">-</div></div>
        <div class="metric-card"><h5>Events Verified</h5><div class="metric-val" id="m-events">-</div></div>
        <div class="metric-card"><h5>Match Rate</h5><div class="metric-val" id="m-match">-</div></div>
        <div class="metric-card"><h5>Uncertain / Mismatch</h5><div class="metric-val" id="m-conflict" style="color:var(--danger);">-</div></div>
        <div class="metric-card"><h5>Duration</h5><div class="metric-val" id="m-duration">-</div></div>
    </div>
</aside>

<!-- BOTTOM: Video -->
<section class="area-bottom">
    <div class="video-wrapper">
        <div class="video-controls">
            <button class="v-btn active" data-mode="original">Original</button>
            <button class="v-btn" data-mode="overlay">AI Overlay</button>
            <span id="time-display" style="font-size:11px; color:#9aa7b6; margin-left:auto;">00:00</span>
        </div>
        <div class="vid-container-inner">
            <video id="myVideo" controls playsinline></video>
        </div>
    </div>
</section>

<script>
// ============================================================
// CONFIG
// ============================================================
const API_ORIGIN = (window.location.protocol === 'file:' || window.location.port !== '8000')
    ? 'http://localhost:8000'
    : '';
const CONFIG = {
    API_ORIGIN: API_ORIGIN,
    BFF_URL: API_ORIGIN + '/api/v1/visualization/case_data',
    BUNDLE_LIST_URL: API_ORIGIN + '/api/bundle/list',
};

const BEHAVIOR_COLORS = {
    tt: '#0984e3', dk: '#00b894', dx: '#fdcb6e', zt: '#e17055',
    js: '#6c5ce7', zl: '#fd79a8', xt: '#00cec9', jz: '#d63031',
    listen: '#0984e3', read: '#00b894', write: '#fdcb6e',
    turn_head: '#e17055', raise_hand: '#6c5ce7', stand: '#fd79a8',
    group_discussion: '#00cec9', teacher_interaction: '#d63031',
    unknown: '#b2bec3'
};
const BEHAVIOR_LABELS = {
    tt: '抬头听课', dk: '低头看书', dx: '低头写字', zt: '转头',
    js: '举手', zl: '站立', xt: '小组讨论', jz: '教师互动',
};

// ============================================================
// GLOBAL STATE
// ============================================================
let currentData = null;       // BFF response { case_info, events[] }
let currentCaseId = null;
let selectedEventId = null;

// ============================================================
// DATA LOADING
// ============================================================
async function loadCaseList() {
    const select = document.getElementById('case-selector');
    try {
        const list = await fetch(CONFIG.BUNDLE_LIST_URL).then(r => r.json());
        select.innerHTML = '<option value="">-- Select Case --</option>';
        (Array.isArray(list) ? list : []).forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.case_id;
            opt.textContent = `${c.case_id} (${c.students} students)`;
            select.appendChild(opt);
        });
    } catch (e) {
        console.warn('Failed to load case list:', e);
    }
    select.addEventListener('change', e => {
        if (e.target.value) loadCaseData(e.target.value);
    });
}

async function loadCaseData(caseId) {
    currentCaseId = caseId;
    selectedEventId = null;
    showLoading(true);
    try {
        const url = `${CONFIG.BFF_URL}?case_id=${encodeURIComponent(caseId)}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const json = await resp.json();
        if (json.status !== 'success') throw new Error(json.message || 'Unknown error');
        currentData = json.data;
        updateCaseInfo();
        updateStats();
        updateAlerts();
        renderAll();
        loadVideo(caseId);
    } catch (e) {
        console.error('Load failed:', e);
        document.getElementById('gantt-container').innerHTML =
            `<div style="text-align:center;padding:40px;color:var(--danger);">Failed to load: ${e.message}</div>`;
    } finally {
        showLoading(false);
    }
}

function showLoading(on) {
    document.querySelectorAll('.loading-mask').forEach(el => el.style.display = on ? 'flex' : 'none');
}

function updateCaseInfo() {
    if (!currentData) return;
    const ci = currentData.case_info;
    document.getElementById('case-info-panel').innerHTML = `
        <div style="font-weight:700;color:var(--text-main);">${ci.case_id}</div>
        <div style="margin-top:4px;">Students: ${ci.student_count}</div>
        <div>Duration: ${ci.duration_sec}s</div>
        <div>Events: ${currentData.events.length}</div>
    `;
}

function updateStats() {
    if (!currentData) return;
    const events = currentData.events;
    const matchCount = events.filter(e => e.verification_status === 'match').length;
    const uncertainCount = events.filter(e => e.verification_status === 'uncertain').length;
    const mismatchCount = events.filter(e => e.verification_status === 'mismatch').length;
    document.getElementById('m-students').textContent = currentData.case_info.student_count;
    document.getElementById('m-events').textContent = events.length;
    document.getElementById('m-match').textContent = `${matchCount} (${(matchCount/events.length*100).toFixed(0)}%)`;
    document.getElementById('m-conflict').textContent = `${uncertainCount} uncertain / ${mismatchCount} mismatch`;
    document.getElementById('m-duration').textContent = `${currentData.case_info.duration_sec}s`;
}

function updateAlerts() {
    if (!currentData) return;
    const events = currentData.events;
    const uncertain = events.filter(e => e.verification_status === 'uncertain').length;
    const mismatch = events.filter(e => e.verification_status === 'mismatch').length;
    const banner = document.getElementById('alert-banner');
    const text = document.getElementById('alert-text');
    if (uncertain + mismatch > 0) {
        banner.classList.add('visible');
        text.textContent = `${uncertain} uncertain, ${mismatch} mismatch — manual review recommended`;
    } else {
        banner.classList.remove('visible');
    }
}

function loadVideo(caseId) {
    const video = document.getElementById('myVideo');
    // Try bundle path first
    const base = `/output/frontend_bundle/${caseId}/assets/`;
    const candidate = `${base}pose_behavior_fusion_yolo11x.mp4`;
    fetch(candidate, { method: 'HEAD' }).then(r => {
        if (r.ok) {
            video.src = candidate;
        }
    }).catch(() => {});
}

// ============================================================
// RENDER: ALL VIEWS
// ============================================================
function renderAll() {
    renderGantt();
    renderWeightCurve();
    renderLegend();
    renderEvidencePlaceholder();
}

// ---- View A: Gantt Timeline ----
function renderGantt() {
    const container = document.getElementById('gantt-container');
    container.innerHTML = '';
    if (!currentData || !currentData.events.length) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">No events to display.</div>';
        return;
    }

    const events = currentData.events;
    const margin = { top: 10, right: 20, bottom: 50, left: 80 };
    const rowH = 20;
    const width = container.clientWidth - margin.left - margin.right;
    // Get unique tracks
    const tracks = [...new Set(events.map(e => e.track_id))].sort();
    const height = Math.max(tracks.length * rowH, 200) + margin.top + margin.bottom;

    const svg = d3.select(container).append('svg')
        .attr('viewBox', `0 0 ${width + margin.left + margin.right} ${height}`)
        .style('width', '100%').style('min-height', height + 'px');

    // SVG defs for uncertain hatch pattern
    const defs = svg.append('defs');
    defs.append('pattern')
        .attr('id', 'diagonalHatch')
        .attr('patternUnits', 'userSpaceOnUse')
        .attr('width', 8).attr('height', 8)
        .append('path')
        .attr('d', 'M-1,1 l2,-2 M0,8 l8,-8 M7,9 l2,-2')
        .attr('stroke', '#f39c12').attr('stroke-width', 2);

    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

    const tMax = d3.max(events, e => e.time_range[1]) || 10;
    const x = d3.scaleLinear().domain([0, tMax]).range([0, width]);
    const y = d3.scaleBand().domain(tracks).range([0, tracks.length * rowH]).padding(0.15);

    // Axes
    g.append('g').call(d3.axisBottom(x).ticks(Math.min(tMax, 30)).tickFormat(d => d + 's'))
        .attr('transform', `translate(0,${tracks.length * rowH})`).selectAll('text').attr('font-size', 10);
    g.append('g').call(d3.axisLeft(y)).selectAll('text').attr('font-size', 10);

    // Brush for zoom
    const brush = d3.brushX().extent([[0, 0], [width, tracks.length * rowH]])
        .on('end', (event) => {
            if (!event.selection) return;
            const [x0, x1] = event.selection.map(x.invert, x);
            x.domain([x0, x1]);
            g.selectAll('.gantt-bar')
                .attr('x', d => x(d.time_range[0]))
                .attr('width', d => Math.max(2, x(d.time_range[1]) - x(d.time_range[0])));
            g.select('.x-axis').call(d3.axisBottom(x).ticks(10).tickFormat(d => d + 's'));
        });
    g.append('g').attr('class', 'brush').call(brush);

    // Draw gantt bars
    const bars = g.selectAll('.gantt-bar').data(events).enter().append('rect')
        .attr('class', d => `gantt-bar ${d.verification_status}`)
        .attr('x', d => x(d.time_range[0]))
        .attr('y', d => y(d.track_id))
        .attr('width', d => Math.max(2, x(d.time_range[1]) - x(d.time_range[0])))
        .attr('height', y.bandwidth())
        .attr('fill', d => {
            if (d.verification_status === 'uncertain') return 'url(#diagonalHatch)';
            if (d.verification_status === 'mismatch') return '#e74c3c';
            return BEHAVIOR_COLORS[d.behavior_type] || BEHAVIOR_COLORS.unknown;
        })
        .attr('rx', 2)
        .on('click', (event, d) => {
            selectedEventId = d.event_id;
            // Highlight
            bars.classed('dimmed', e => e.event_id !== d.event_id);
            // Show evidence
            renderEvidenceDetail(d);
            switchTab('evidence');
            // Seek video
            const video = document.getElementById('myVideo');
            if (video && d.time_range[0] !== undefined) {
                video.currentTime = Math.max(0, d.time_range[0]);
            }
        })
        .append('title')
        .text(d => `${d.track_id}: ${BEHAVIOR_LABELS[d.behavior_type] || d.behavior_type} [${d.time_range[0]}-${d.time_range[1]}s] status=${d.verification_status}`);

    // Reset highlight on double-click
    svg.on('dblclick', () => {
        selectedEventId = null;
        bars.classed('dimmed', false);
        renderEvidencePlaceholder();
        switchTab('gantt');
    });

    // Time cursor line
    const cursor = g.append('line').attr('class', 'cursor-line')
        .attr('y1', 0).attr('y2', tracks.length * rowH)
        .attr('stroke', '#e74c3c').attr('stroke-width', 1.5).attr('stroke-dasharray', '4,2')
        .style('display', 'none');
    document.getElementById('myVideo')?.addEventListener('timeupdate', () => {
        const t = document.getElementById('myVideo').currentTime;
        if (isFinite(t) && t >= 0) {
            cursor.attr('x1', x(t)).attr('x2', x(t)).style('display', null);
        }
    });
}

// ---- View B: Weight Dynamics Curve ----
function renderWeightCurve() {
    const container = document.getElementById('weight-chart');
    container.innerHTML = '';
    if (!currentData || !currentData.events.length) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">No weight data.</div>';
        return;
    }

    const margin = { top: 30, right: 40, bottom: 40, left: 50 };
    const width = container.clientWidth - margin.left - margin.right;
    const height = Math.max(container.clientHeight, 250) - margin.top - margin.bottom;

    const svg = d3.select(container).append('svg')
        .attr('viewBox', `0 0 ${width + margin.left + margin.right} ${height + margin.top + margin.bottom}`)
        .style('width', '100%').style('height', '100%');
    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

    const events = currentData.events.filter(e =>
        e.evidence_metrics.weight_a > 0 || e.evidence_metrics.weight_v < 1.0
    );
    // Fallback: use all if no audio events
    const data = events.length > 0 ? events : currentData.events;

    const tMax = d3.max(data, e => e.time_range[1]) || 10;
    const x = d3.scaleLinear().domain([0, tMax]).range([0, width]);

    // Build step line data
    const lineData = [];
    data.forEach(d => {
        const t0 = d.time_range[0], t1 = d.time_range[1];
        lineData.push({ t: t0, wv: d.evidence_metrics.weight_v, wa: d.evidence_metrics.weight_a });
        lineData.push({ t: t1, wv: d.evidence_metrics.weight_v, wa: d.evidence_metrics.weight_a });
    });
    lineData.sort((a, b) => a.t - b.t);

    const y = d3.scaleLinear().domain([0, 1]).range([height, 0]);

    g.append('g').call(d3.axisBottom(x).ticks(10).tickFormat(d => d + 's'))
        .attr('transform', `translate(0,${height})`).selectAll('text').attr('font-size', 10);
    g.append('g').call(d3.axisLeft(y).ticks(5)).selectAll('text').attr('font-size', 10);
    g.append('text').attr('transform', 'rotate(-90)').attr('y', -40).attr('x', -height / 2)
        .attr('fill', '#666').style('font-size', '11px').attr('text-anchor', 'middle')
        .text('Weight');

    // Lines
    const lineWv = d3.line().curve(d3.curveStepAfter).x(d => x(d.t)).y(d => y(d.wv));
    const lineWa = d3.line().curve(d3.curveStepAfter).x(d => x(d.t)).y(d => y(d.wa));

    g.append('path').datum(lineData).attr('class', 'line-wv').attr('d', lineWv);
    g.append('path').datum(lineData).attr('class', 'line-wa').attr('d', lineWa);

    // Legend
    g.append('text').attr('x', width - 150).attr('y', 10).attr('fill', '#0984e3').style('font-size', '11px')
        .text('— ω_v (visual)');
    g.append('text').attr('x', width - 150).attr('y', 24).attr('fill', '#e67e22').style('font-size', '11px')
        .text('- - ω_a (audio)');

    // X-axis brush for zoom sync
    const brush = d3.brushX().extent([[0, -5], [width, height + 5]])
        .on('end', (event) => {
            if (!event.selection) return;
            const [x0, x1] = event.selection.map(x.invert, x);
            x.domain([x0, x1]);
            g.select('.x-axis').call(d3.axisBottom(x).ticks(8).tickFormat(d => d + 's'));
            g.select('.line-wv').attr('d', lineWv);
            g.select('.line-wa').attr('d', lineWa);
        });
    g.append('g').attr('class', 'brush').call(brush);
}

function drawRadar(em) {
    const svg = d3.select('#radar-svg');
    svg.selectAll('*').remove();
    const w = 260, h = 260, r = 100, cx = w / 2, cy = h / 2;

    const axes = [
        { name: 'Visual', value: em.c_visual, max: 1 },
        { name: 'Text', value: em.c_text !== null ? em.c_text : 0, max: 1 },
        { name: 'Stability', value: 1 - em.uq_track, max: 1 },
        { name: 'w_visual', value: em.weight_v, max: 1 },
        { name: 'w_audio', value: em.weight_a, max: 1 },
    ];
    const n = axes.length;
    const angleSlice = (2 * Math.PI) / n;

    svg.attr('viewBox', `0 0 ${w} ${h}`).style('width', '100%').style('max-width', '280px');
    const g = svg.append('g').attr('transform', `translate(${cx},${cy})`);

    // Grid
    [0.25, 0.5, 0.75, 1].forEach(level => {
        const pts = axes.map((_, i) => {
            const a = i * angleSlice - Math.PI / 2;
            return [r * level * Math.cos(a), r * level * Math.sin(a)];
        });
        g.append('polygon').attr('points', pts.map(p => p.join(',')).join(' '))
            .attr('fill', 'none').attr('stroke', '#e0e0e0').attr('stroke-width', 0.5);
    });

    // Axes
    axes.forEach((_, i) => {
        const a = i * angleSlice - Math.PI / 2;
        g.append('line').attr('x1', 0).attr('y1', 0).attr('x2', r * Math.cos(a)).attr('y2', r * Math.sin(a))
            .attr('stroke', '#ddd').attr('stroke-width', 0.5);
    });

    // Data polygon
    const dataPts = axes.map((d, i) => {
        const a = i * angleSlice - Math.PI / 2;
        const val = Math.max(0, Math.min(1, d.value));
        return [r * val * Math.cos(a), r * val * Math.sin(a)];
    });
    g.append('polygon').attr('points', dataPts.map(p => p.join(',')).join(' '))
        .attr('fill', 'rgba(9,132,227,0.25)').attr('stroke', '#0984e3').attr('stroke-width', 1.5);

    // Labels
    axes.forEach((d, i) => {
        const a = i * angleSlice - Math.PI / 2;
        g.append('text').attr('x', (r + 18) * Math.cos(a)).attr('y', (r + 18) * Math.sin(a))
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('font-size', 10).attr('fill', '#596b7d').text(d.name);
    });
}

// ============================================================
function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
    const btn = document.querySelector(`[data-tab="${tabId}"]`);
    const panel = document.getElementById(`view-${tabId}`);
    if (btn) btn.classList.add('active');
    if (panel) panel.classList.add('active');
    // Re-render weight chart if switching to it (needs container dimensions)
    if (tabId === 'weight') setTimeout(renderWeightCurve, 100);
}

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});
